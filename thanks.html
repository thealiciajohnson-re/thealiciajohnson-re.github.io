<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank You — Alicia Johnson</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--navy:#3f3a34;--accent:#a98c6b;--accent-dark:#8c7052;--bg:#f7f3ec;--line:#e6ddd0;--text:#463f38;--muted:#8a7f72}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;
    font-family:'Jost',system-ui,sans-serif;font-weight:300;color:var(--text);
    background:radial-gradient(58% 60% at 80% 18%,rgba(200,166,120,.28),transparent),
      linear-gradient(165deg,#faf6ef 0%,#f4ecdf 55%,#eee3d3 100%)}
  .card{max-width:560px;text-align:center;background:#fff;border:1px solid var(--line);
    border-radius:18px;padding:54px 44px;box-shadow:0 22px 55px rgba(140,112,82,.14)}
  .brand{font-family:'Great Vibes',cursive;font-size:2.2rem;color:var(--navy);margin-bottom:6px}
  .brand small{display:block;font-family:'Jost';font-weight:400;letter-spacing:.18em;
    text-transform:uppercase;font-size:.62rem;color:var(--muted);margin-top:4px}
  .check{width:64px;height:64px;border-radius:50%;margin:22px auto 10px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;
    font-size:32px;line-height:64px;font-weight:400}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;color:var(--navy);
    font-size:2.3rem;line-height:1.2;margin:12px 0 10px}
  p{color:var(--muted);line-height:1.7;margin:0 auto 8px;max-width:420px}
  .btn{display:inline-block;margin-top:26px;padding:13px 30px;border-radius:999px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;
    text-decoration:none;font-weight:500;letter-spacing:.02em}
  .contact{margin-top:24px;font-size:.9rem;color:var(--muted)}
  .contact a{color:var(--accent-dark);text-decoration:none;font-weight:500}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Alicia Johnson<small>North Bay Real Estate</small></div>
    <div class="check">&#10003;</div>
    <h1>Thank You!</h1>
    <p>Your message is on its way to me. I read every note personally and will be in touch very soon &mdash; usually within a day.</p>
    <a class="btn" href="https://thealiciajohnsonhomes.com/">&larr; Back to Home</a>
    <div class="contact">Need me sooner? Call or text <a href="tel:+17078496775">(707) 849-6775</a></div>
  </div>
</body>
</html>
